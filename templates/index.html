<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook邮件助手 - 控制面板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-envelope-fill"></i> Outlook邮件助手
            </span>
            <span class="navbar-text text-white" id="statusText">
                <i class="bi bi-circle-fill text-success"></i> 就绪
            </span>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- 左侧菜单 -->
            <div class="col-md-2">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active" data-page="dashboard">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" data-page="rules">
                        <i class="bi bi-list-check"></i> 规则管理
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" data-page="logs">
                        <i class="bi bi-clock-history"></i> 执行记录
                    </a>
                    <a href="#" class="list-group-item list-group-item-action" data-page="settings">
                        <i class="bi bi-gear"></i> 系统设置
                    </a>
                </div>

                <div class="mt-3">
                    <button class="btn btn-success w-100" id="executeBtn" onclick="executeNow()">
                        <i class="bi bi-play-fill"></i> 立即执行
                    </button>
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="dryRunCheck">
                        <label class="form-check-label" for="dryRunCheck">
                            试运行模式
                        </label>
                    </div>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10">
                <!-- 仪表盘页面 -->
                <div id="dashboard-page" class="page-content">
                    <h2><i class="bi bi-speedometer2"></i> 仪表盘</h2>
                    
                    <!-- 统计卡片 -->
                    <div class="row mt-4">
                        <div class="col-md-3">
                            <div class="card bg-primary text-white">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h6 class="card-title">总执行次数</h6>
                                            <h3 id="totalExecutions">-</h3>
                                        </div>
                                        <i class="bi bi-arrow-repeat fs-1"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-success text-white">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h6 class="card-title">已处理邮件</h6>
                                            <h3 id="totalEmails">-</h3>
                                        </div>
                                        <i class="bi bi-envelope-check fs-1"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-warning text-dark">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h6 class="card-title">匹配规则</h6>
                                            <h3 id="totalMatched">-</h3>
                                        </div>
                                        <i class="bi bi-funnel fs-1"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card bg-info text-white">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <div>
                                            <h6 class="card-title">执行动作</h6>
                                            <h3 id="totalActions">-</h3>
                                        </div>
                                        <i class="bi bi-lightning fs-1"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 今日统计 -->
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="card">
                                <div class="card-header">
                                    <i class="bi bi-calendar-day"></i> 今日统计
                                </div>
                                <div class="card-body">
                                    <div class="row">
                                        <div class="col-md-4 text-center">
                                            <h5 id="todayEmails">-</h5>
                                            <small class="text-muted">处理邮件</small>
                                        </div>
                                        <div class="col-md-4 text-center">
                                            <h5 id="todayMatched">-</h5>
                                            <small class="text-muted">匹配规则</small>
                                        </div>
                                        <div class="col-md-4 text-center">
                                            <h5 id="todayActions">-</h5>
                                            <small class="text-muted">执行动作</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 最近执行记录 -->
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <span><i class="bi bi-clock-history"></i> 最近执行记录</span>
                                    <a href="#" class="btn btn-sm btn-outline-primary" onclick="showPage('logs')">查看全部</a>
                                </div>
                                <div class="card-body">
                                    <table class="table table-striped">
                                        <thead>
                                            <tr>
                                                <th>时间</th>
                                                <th>处理邮件</th>
                                                <th>匹配</th>
                                                <th>动作</th>
                                                <th>耗时</th>
                                                <th>状态</th>
                                            </tr>
                                        </thead>
                                        <tbody id="recentLogs">
                                            <tr>
                                                <td colspan="6" class="text-center text-muted">暂无记录</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 规则管理页面 -->
                <div id="rules-page" class="page-content" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2><i class="bi bi-list-check"></i> 规则管理</h2>
                        <button class="btn btn-primary" onclick="addNewRule()">
                            <i class="bi bi-plus-lg"></i> 新建规则
                        </button>
                    </div>

                    <div class="alert alert-info mt-3">
                        <i class="bi bi-info-circle"></i> 
                        规则按顺序匹配，匹配成功的规则会执行相应动作。建议将更具体的规则放在前面。
                    </div>

                    <div id="rulesList" class="mt-3">
                        <!-- 规则列表将在这里动态生成 -->
                    </div>
                </div>

                <!-- 执行记录页面 -->
                <div id="logs-page" class="page-content" style="display:none;">
                    <h2><i class="bi bi-clock-history"></i> 执行记录</h2>
                    
                    <div class="card mt-3">
                        <div class="card-body">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>执行时间</th>
                                        <th>处理邮件</th>
                                        <th>匹配规则</th>
                                        <th>执行动作</th>
                                        <th>错误</th>
                                        <th>耗时</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="allLogs">
                                    <tr>
                                        <td colspan="8" class="text-center text-muted">暂无记录</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 系统设置页面 -->
                <div id="settings-page" class="page-content" style="display:none;">
                    <h2><i class="bi bi-gear"></i> 系统设置</h2>
                    
                    <div class="card mt-3">
                        <div class="card-body">
                            <form id="settingsForm">
                                <div class="mb-3">
                                    <label class="form-label">检查间隔（秒）</label>
                                    <input type="number" class="form-control" id="checkInterval" value="60" min="10">
                                    <div class="form-text">自动检查新邮件的时间间隔</div>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="processUnreadOnly" checked>
                                    <label class="form-check-label">只处理未读邮件</label>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">每批最大邮件数</label>
                                    <input type="number" class="form-control" id="maxEmailsPerBatch" value="50" min="1" max="200">
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="markAsRead">
                                    <label class="form-check-label">处理后标记为已读</label>
                                </div>

                                <button type="button" class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 规则编辑模态框 -->
    <div class="modal fade" id="ruleModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑规则</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="ruleForm">
                        <input type="hidden" id="ruleId">
                        
                        <div class="mb-3">
                            <label class="form-label">规则名称</label>
                            <input type="text" class="form-control" id="ruleName" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="ruleEnabled" checked>
                            <label class="form-check-label">启用此规则</label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">条件匹配方式</label>
                            <select class="form-select" id="matchAll">
                                <option value="true">满足所有条件（AND）</option>
                                <option value="false">满足任一条件（OR）</option>
                            </select>
                        </div>

                        <h6 class="mt-4">条件设置</h6>
                        <div id="conditionsList">
                            <!-- 条件列表 -->
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addCondition()">
                            <i class="bi bi-plus"></i> 添加条件
                        </button>

                        <h6 class="mt-4">执行动作</h6>
                        <div id="actionsList">
                            <!-- 动作列表 -->
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addAction()">
                            <i class="bi bi-plus"></i> 添加动作
                        </button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveRule()">保存规则</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 日志详情模态框 -->
    <div class="modal fade" id="logDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">执行详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="logDetailContent">
                        <!-- 详情内容 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
